# Builds GridTV for every supported platform whenever the codebase changes.
#
# What it builds, per OS:
#   • Linux   (ubuntu) — core lib + CLI tools + libVLC harness + VLC plugin (.so)
#   • macOS   (Apple)  — core lib + CLI tools + libVLC harness + VLC plugin (.dylib)
#   • Windows          — core lib + CLI tools (the VLC plugin link needs the VLC
#                        SDK import lib and is attempted best-effort, see below)
#
# Artifacts (the plugin + the CLI tools) are uploaded per run. Pushing a `v*`
# tag also attaches the built plugins to a GitHub Release.
#
# All three platforms (Linux, macOS, Windows) build the full VLC plugin + CLI
# tools as REQUIRED checks — a break on any OS turns the run red. Windows
# builds under MinGW: deps from vcpkg's x64-mingw-static triplet, a poll()
# shim for VLC's headers, and VLC import libs generated (gendef+dlltool) from
# the win64 package's libvlccore/libvlc DLLs. The optional libVLC harness is
# built only on Linux (where libvlc-dev is reliably present).

name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
    paths-ignore:           # don't rebuild for docs/metadata-only changes
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
  workflow_dispatch:        # manual "Run workflow" from the Actions tab

permissions:
  contents: read

jobs:
  lint:
    # Fast, cheap gate: statically validate the workflow(s) themselves.
    # Catches broken expressions, undefined job deps, matrix mismatch, and
    # project-specific issues (CMake target typos, unpinned actions) before a
    # build even starts.
    name: Lint workflow
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"
      - name: Install pyyaml (optional; the check degrades without it)
        run: python3 -m pip install --user pyyaml || true
      - name: Lint + validate workflow
        run: scripts/check-ci.sh

  # ── audit: static + dynamic memory-safety analysis. Single OS (Linux): the
  # analyzers are a one-line apt install, the VLC plugin builds against the
  # distro headers, and the C++ is identical on every OS so analysing once is
  # enough. Three hard gates (clang static analyzer, cppcheck, ASAN+UBSAN) plus
  # one informational clang-tidy report. Not matrixed and not a release gate.
  audit:
    name: Memory-safety analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install analyzers + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang clang-tools clang-tidy cppcheck \
            cmake ninja-build pkg-config \
            librtmidi-dev liblo-dev libvlc-dev libvlccore-dev

      - name: Configure under the static analyzer (clang; export compile_commands)
        run: |
          scan-build --use-cc clang --use-c++ clang++ \
            cmake -S . -B build-audit -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: clang static analyzer (scan-build) — hard gate
        run: |
          # Path-sensitive analysis (null-deref, use-after-free, leak, ...).
          # scan-build prints "No bugs found" when clean; fail otherwise.
          scan-build --use-cc clang --use-c++ clang++ -o scan-build-report \
            cmake --build build-audit --target gridtv_plugin gridtv_device_test > scan-build.log 2>&1
          grep -qE "scan-build: No bugs found" scan-build.log \
            || { echo "::error::clang static analyzer reported bugs (see analysis-reports artifact)"; cat scan-build.log; exit 1; }

      - name: cppcheck (whole project; warning + performance) — hard gate
        run: |
          # warning/performance level = real issues (null/buffer/leak). Analyses
          # the WHOLE project including the plugin (the most safety-relevant
          # file). False positives, all documented:
          #  - .cppcheck-suppressions (wildcards): VLC's OWN headers trip cppcheck's
          #    parser (bogus memleak in vlc_arrays.h, syntaxError in vlc_mtime.h —
          #    not our code; the clang static analyzer parses VLC headers fine).
          #  - virtualCallInConstructor / noExplicitConstructor: style FPs on our
          #    concrete device classes (dtor->virtual resolves to the same class).
          # returnDanglingLifetime in convert_rgb/new_rgb is suppressed INLINE at
          # those sites: picture_NewFromFormat / image_Convert copy the video
          # format BY VALUE into the new picture, so returning it is safe.
          cppcheck --project=build-audit/compile_commands.json \
            --enable=warning,performance \
            --suppressions-list=.cppcheck-suppressions \
            --suppress=missingIncludeSystem \
            --suppress=virtualCallInConstructor \
            --suppress=noExplicitConstructor \
            --inline-suppr --error-exitcode=1

      - name: clang-tidy — informational report (overlaps scan-build; not a gate)
        run: |
          printf '%s\n' \
            module_vlc/gridtv_plugin.cpp \
            src/frame_processor.cpp \
            src/devices/launchpad_mini_mk3.cpp \
            src/devices/launchpad_classic.cpp \
            src/devices/monome_128.cpp \
            harness/gridtv_vlc.cpp > tidy.files
          # Deliberately NOT --warnings-as-errors: see .clang-tidy (report only).
          xargs -a tidy.files clang-tidy -p build-audit > clang-tidy-report.txt 2>&1 || true
          echo "clang-tidy: $(grep -c 'warning:' clang-tidy-report.txt 2>/dev/null || echo 0) warnings (informational)"

      - name: Build library test under ASAN + UBSAN
        run: |
          cmake -S . -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          cmake --build build-asan --target gridtv_device_test -j

      - name: Run under ASAN + UBSAN — hard gate (sanitizer output = fail)
        env:
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          # No Launchpad on CI, so device_test exits 1 on connect — that's
          # expected. The GATE is whether a sanitizer fires, not the exit code.
          ./build-asan/gridtv_device_test > asan.log 2>&1 || true
          if grep -qE "AddressSanitizer|runtime error:|UndefinedBehaviorSanitizer" asan.log; then
            echo "::error::ASAN/UBSAN reported an issue"; cat asan.log; exit 1
          fi
          echo "ASAN/UBSAN clean"

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: analysis-reports
          path: |
            scan-build-report/
            clang-tidy-report.txt
            asan.log
            tidy.files

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    concurrency:
      # One group per (ref, OS): matrix legs run in parallel, but a new push
      # supersedes the previous run of that OS on the same ref.
      group: ${{ github.workflow }}-build-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04          # pinned: ubuntu-latest could move to a new VLC
            plugin: libgridtv_plugin.so
          - os: macos-14              # pinned: Apple Silicon
            plugin: libgridtv_plugin.dylib
          - os: windows-latest
            plugin: libgridtv_plugin.dll

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      # ── dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            librtmidi-dev liblo-dev libvlc-dev libvlccore-dev
          # Pin VLC: hold against upgrades, and assert the version + the t64
          # module-ABI patch we depend on. Fails loud if the distro VLC drifts.
          sudo apt-mark hold vlc libvlc-dev libvlccore-dev
          case "$(pkg-config --modversion libvlc)" in
            3.0.*) ;; *) echo "VLC drifted from pinned 3.0.x: $(pkg-config --modversion libvlc)"; exit 1 ;;
          esac
          grep -q 'MODULE_SYMBOL 3_0_0ft64' /usr/include/vlc/plugins/vlc_plugin.h \
            || { echo "expected ubuntu t64 module-ABI patch missing"; exit 1; }

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config rtmidi liblo
          # VLC.app provides the libvlc headers + lib for the harness. Homebrew
          # verifies the cask's sha256; assert major.minor so a future VLC 4.x
          # fails loud (3.0.x shares one module ABI on unpatched macOS/Windows).
          brew install --cask vlc || true
          case "$(/Applications/VLC.app/Contents/MacOS/VLC --version 2>&1 | head -1 | cut -d' ' -f3)" in
            3.0.*) ;; *) echo "macOS VLC drifted from pinned 3.0.x"; exit 1 ;;
          esac

      - name: Install dependencies (Windows, via vcpkg)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          : "${VCPKG_ROOT:=C:/vcpkg}"
          # Build the deps with MinGW to match the runner's compiler: under bash,
          # CMake/Ninja picks MinGW g++, whose ABI clashes with vcpkg's default
          # MSVC (x64-windows) libs. x64-mingw-static is a vcpkg community triplet.
          vcpkg install rtmidi liblo --triplet x64-mingw-static \
            --overlay-triplets="$VCPKG_ROOT/triplets/community"
          # A Windows VLC DLL must bind its imports at link time (unlike an ELF
          # .so). The win64 package is runtime-only (no sdk/ import libs), so
          # generate MinGW import libs from its libvlccore.dll / libvlc.dll.
          curl -fL -o /tmp/vlc.7z https://download.videolan.org/pub/videolan/vlc/3.0.23/win64/vlc-3.0.23-win64.7z
          # Verify the pinned VLC binary (matches videolan's published .sha256).
          if command -v sha256sum >/dev/null 2>&1; then
            ACT="$(sha256sum /tmp/vlc.7z | cut -d' ' -f1)"
          else
            ACT="$(shasum -a 256 /tmp/vlc.7z | cut -d' ' -f1)"
          fi
          [ "$ACT" = "eb4fd8a28291da73608c733786a09610fea865fbe94113bcb60b91c1ebb8404a" ] \
            || { echo "VLC win64.7z sha256 mismatch: $ACT"; exit 1; }
          7z x /tmp/vlc.7z -o/tmp/vlcsdk -y >/dev/null
          LIBCC_DLL="$(find /tmp/vlcsdk -name libvlccore.dll | head -1)"
          test -n "$LIBCC_DLL" || { echo "ERROR: libvlccore.dll not in package"; ls /tmp/vlcsdk; exit 1; }
          VLCBIN="$(dirname "$LIBCC_DLL")"
          # Guard the $GITHUB_ENV write below: a newline in a path (e.g. from a
          # tampered archive) is the classic env-injection vector.
          case "$VLCBIN" in *$'\n'*) echo "ERROR: suspicious (newline-bearing) path in VLC SDK"; exit 1;; esac
          ( cd "$VLCBIN" \
            && gendef libvlccore.dll && dlltool -d libvlccore.def -l libvlccore.dll.a \
            && gendef libvlc.dll    && dlltool -d libvlc.def    -l libvlc.dll.a )
          echo "VLC_SDK_LIB=$VLCBIN" >> "$GITHUB_ENV"
          echo "Generated VLC import libs in $VLCBIN"

      # ── VLC module headers (required by the plugin) ───────────────────────
      # The plugin compiles against VLC's internal module headers
      # (vlc_plugin.h, vlc_filter.h, …). They are vendored locally under
      # third_party/vlc-src but are NOT committed (gitignored), so CI fetches
      # just the include/ tree from the 3.0.23 tag with a sparse checkout.
      - name: Fetch VLC module headers (pinned 3.0.23; Linux uses system headers)
        if: runner.os != 'Linux'          # Linux builds against /usr/include/vlc/plugins (libvlccore-dev)
        shell: bash
        run: |
          set -e
          if [ -f third_party/vlc-src/include/vlc_plugin.h ]; then
            echo "vlc headers already present"
            exit 0
          fi
          # Pinned to upstream 3.0.23. Only feeds macOS/Windows, where VLC is
          # unpatched and the module ABI is 3_0_0f across all 3.0.x.
          git clone --depth 1 --branch 3.0.23 --filter=blob:none --sparse \
            https://github.com/videolan/vlc.git third_party/vlc-src
          git -C third_party/vlc-src sparse-checkout set include

      # ── configure ─────────────────────────────────────────────────────────
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          : "${VCPKG_ROOT:=C:/vcpkg}"   # canonical vcpkg root on GitHub windows runners
          # MinGW toolchain throughout: Ninja picks MinGW g++, and we build the
          # vcpkg deps with the matching x64-mingw-static triplet (ABI-consistent).
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static \
            -DVCPKG_OVERLAY_TRIPLETS="$VCPKG_ROOT/triplets/community" \
            -DVLC_SDK_LIB="${VLC_SDK_LIB}" \
            -DVLC_APP="C:/Program Files/VideoLAN/VLC"

      # ── build (core lib + CLI tools build everywhere) ─────────────────────
      - name: Build core library + CLI tools
        shell: bash
        run: |
          cmake --build build --config Release -j \
            --target gridtv_device_test gridtv_probe gridtv_midi_probe gridtv_monome_mock

      - name: Build VLC plugin
        shell: bash
        run: cmake --build build --config Release -j --target gridtv_plugin

      - name: Build libVLC harness
        # Optional dev tool; libvlc headers are reliably present on Linux only
        # (apt libvlc-dev), so build it there. macOS/Windows skip it.
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --config Release -j --target gridtv_vlc

      # ── artifacts ─────────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: gridtv-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            build/**/*gridtv_plugin*
            build/**/gridtv_vlc*
            build/**/gridtv_device_test*
            build/**/gridtv_probe*
            build/**/gridtv_midi_probe*
            build/**/gridtv_monome_mock*

  # ── smoke: install the plugin from the build artifacts and confirm VLC loads it
  smoke:
    needs: build
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install VLC
        shell: bash
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then brew install --cask vlc; \
          else sudo apt-get update && sudo apt-get install -y --no-install-recommends vlc; fi
      - name: Download the built plugin for this OS
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: gridtv-${{ matrix.os }}
          path: plugin
      - name: Install via install.sh + verify VLC lists gridtv
        shell: bash
        run: |
          set -e
          if [ "$(uname -s)" = "Darwin" ]; then
            # macOS: install into an isolated HOME (user folder + VLC_PLUGIN_PATH)
            fakehome="$(mktemp -d)"; export HOME="$fakehome"
            sh install/install.sh "$(find plugin -name 'libgridtv_plugin.dylib' | head -n1)"
            DEST="$HOME/Library/Application Support/gridtv"
            test -f "$DEST/libgridtv_plugin.dylib"
            VLC_PLUGIN_PATH="$DEST" /Applications/VLC.app/Contents/MacOS/VLC --list 2>&1 | grep -i gridtv
          else
            # Linux: install.sh copies into VLC's system folder; VLC lists it.
            sh install/install.sh "$(find plugin -name 'libgridtv_plugin.so' | head -n1)"
            vlc --reset-plugins-cache >/dev/null 2>&1 || true
            vlc --list 2>&1 | grep -i gridtv
          fi

  # ── release: attach the built plugins to a GitHub Release on a v* tag ──────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref }}
      cancel-in-progress: false   # never cancel a release mid-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach plugins + installers to the GitHub Release
        # Built-in gh CLI (no third-party action with write scope). Tag name
        # goes through an env var, not a ${{ }} in run:, to avoid injection.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --generate-notes \
            artifacts/*gridtv_plugin* install/install.sh install/windows.ps1 2>/dev/null \
            || gh release upload "$TAG" artifacts/*gridtv_plugin* install/install.sh install/windows.ps1 --clobber
